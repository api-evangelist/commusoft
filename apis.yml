name: Commusoft
description: >-
  Commusoft is a cloud-based field service management software platform founded
  in 2006, purpose-built for trades businesses including HVAC, plumbing,
  electrical, and building maintenance contractors. The platform provides a
  comprehensive REST API that enables developers and integration partners to
  manage jobs, customers, engineers, quotes, invoices, parts, and service
  histories programmatically. Commusoft's API powers integrations with
  accounting tools such as QuickBooks, Xero, and Sage, as well as payment
  processors like Stripe and GoCardless, and workflow automation platforms like
  Zapier. The API is documented on Apiary and supports OAuth-based
  authentication, enabling secure third-party access to job management workflows
  and customer data. With over 10,000 active users completing 2.1 million jobs
  annually, Commusoft sits at the intersection of field operations and digital
  integration for service businesses.
